apiGateway:
  replicaCount: 3
  image:
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  env:
    NODE_ENV: production
    LOG_LEVEL: warn
    RATE_LIMIT_WINDOW_MS: "60000"
    RATE_LIMIT_MAX_REQUESTS: "60"
    CB_TIMEOUT_MS: "3000"
    CB_ERROR_THRESHOLD_PCT: "40"
    CB_RESET_TIMEOUT_MS: "45000"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 65
  pdb:
    minAvailable: 2

settlementService:
  replicaCount: 3
  image:
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  env:
    ENVIRONMENT: production
    SETTLEMENT_LOG_LEVEL: WARNING
    SETTLEMENT_WORKERS: "8"
    SETTLEMENT_MAX_AMOUNT: "10000000.00"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 65
  pdb:
    minAvailable: 2

fraudDetection:
  replicaCount: 4
  image:
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "4Gi"
  env:
    ENVIRONMENT: production
    FRAUD_LOG_LEVEL: WARNING
    FRAUD_WORKERS: "8"
    FRAUD_RISK_THRESHOLD: "0.80"
    FRAUD_MODEL_PATH: /app/artifacts/fraud_model.joblib
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 20
    targetCPUUtilizationPercentage: 55
  pdb:
    maxUnavailable: "25%"
  persistence:
    storageClass: "gp3"
    size: 10Gi

notificationService:
  replicaCount: 3
  image:
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  env:
    NODE_ENV: production
    LOG_LEVEL: warn
  pdb:
    minAvailable: 2

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: "api.nexus-settlement.example.com"
  tls:
    enabled: true
    secretName: "nexus-tls-cert"

vault:
  enabled: true
  address: "https://vault.internal.example.com"
  role: "nexus-settlement"
  secretPath: "nexus/data/settlement-service"

otel:
  enabled: true
  endpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"

retrainCronJob:
  enabled: true
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
