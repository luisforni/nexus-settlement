{{- if .Values.retrainCronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fraud-model-retrain
  namespace: {{ .Values.namespace.name }}
  labels:
    app: fraud-model-retrain
    {{- include "nexus-settlement.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.retrainCronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: fraud-model-retrain
        spec:
          restartPolicy: OnFailure
          serviceAccountName: fraud-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
          containers:
            - name: retrain
              image: "{{ .Values.fraudDetection.image.repository }}:{{ .Values.fraudDetection.image.tag }}"
              imagePullPolicy: {{ .Values.fraudDetection.image.pullPolicy }}
              command:
                - python
                - /app/scripts/retrain_pipeline.py
              args:
                - "--n-samples={{ .Values.retrainCronjob.nSamples }}"
                - "--min-auc={{ .Values.retrainCronjob.minAuc }}"
                - "--artifact=/app/artifacts/fraud_model.joblib"
              env:
                - name: KAFKA_BOOTSTRAP_SERVERS
                  valueFrom:
                    secretKeyRef:
                      name: kafka-secrets
                      key: bootstrap-servers
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
              {{- if .Values.fraudDetection.persistence.enabled }}
              volumeMounts:
                - name: model-artifacts
                  mountPath: /app/artifacts
              {{- end }}
          {{- if .Values.fraudDetection.persistence.enabled }}
          volumes:
            - name: model-artifacts
              persistentVolumeClaim:
                claimName: fraud-model-artifacts-pvc
          {{- end }}
{{- end }}
