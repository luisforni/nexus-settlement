{{- if .Values.notificationService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Values.namespace.name }}
  labels:
    app: notification-service
    {{- include "nexus-settlement.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notificationService.replicaCount }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-service
          image: "{{ .Values.notificationService.image.repository }}:{{ .Values.notificationService.image.tag }}"
          imagePullPolicy: {{ .Values.notificationService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.notificationService.service.port }}
          env:
            {{- range $k, $v := .Values.notificationService.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- include "nexus-settlement.otelEnv" . | nindent 12 }}
            - name: OTEL_SERVICE_NAME
              value: notification-service
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: kafka-secrets
                  key: bootstrap-servers
          resources:
            {{- toYaml .Values.notificationService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Values.namespace.name }}
  labels:
    app: notification-service
    {{- include "nexus-settlement.labels" . | nindent 4 }}
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: {{ .Values.notificationService.service.port }}
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service-pdb
  namespace: {{ .Values.namespace.name }}
spec:
  minAvailable: {{ .Values.notificationService.pdb.minAvailable }}
  selector:
    matchLabels:
      app: notification-service
{{- end }}
