---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: nexus-settlement
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
        tier: backend
    spec:
      serviceAccountName: notification-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1003
        runAsGroup: 1003
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: notification-service
          image: nexus/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8003
          env:
            - name: NODE_ENV
              value: "production"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-config
                  key: bootstrap_servers
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: secret_access_key
            - name: SES_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: notification-config
                  key: ses_from_email
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: twilio-secrets
                  key: account_sid
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: twilio-secrets
                  key: auth_token
                  optional: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: nexus-settlement
spec:
  selector:
    app: notification-service
  ports:
    - name: health
      port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-hpa
  namespace: nexus-settlement
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-pdb
  namespace: nexus-settlement
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: notification-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-sa
  namespace: nexus-settlement
automountServiceAccountToken: false
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: nexus-settlement
data:
  bootstrap_servers: "kafka:9092"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: nexus-settlement
data:
  ses_from_email: "noreply@nexus-settlement.example.com"
