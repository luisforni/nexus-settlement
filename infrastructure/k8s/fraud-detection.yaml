---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: nexus-settlement
  labels:
    app: fraud-detection
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fraud-detection
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fraud-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1002
        runAsGroup: 1002
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      initContainers:

        - name: model-init
          image: nexus/fraud-detection:latest
          command: ["sh", "-c", "echo 'Model artifacts ready'"]
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/models/artifacts
      containers:
        - name: fraud-detection
          image: nexus/fraud-detection:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: FRAUD_MODEL_PATH
              value: "/app/models/artifacts/fraud_model.joblib"
            - name: FRAUD_LOG_LEVEL
              value: "INFO"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-config
                  key: bootstrap_servers
            - name: FRAUD_RISK_THRESHOLD
              value: "0.75"
            - name: FRAUD_CHECK_TIMEOUT_SECONDS
              value: "3.0"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/fraud/health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/fraud/health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/models/artifacts
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-artifacts
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection
  namespace: nexus-settlement
spec:
  selector:
    app: fraud-detection
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-hpa
  namespace: nexus-settlement
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-detection
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-pdb
  namespace: nexus-settlement
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fraud-detection
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-sa
  namespace: nexus-settlement
automountServiceAccountToken: false
