apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-secret-rotation
  namespace: nexus-settlement
  labels:
    app.kubernetes.io/name: vault-secret-rotation
    app.kubernetes.io/component: security
spec:

  schedule: "0 3 * * 0"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vault-secret-rotation
        spec:
          restartPolicy: OnFailure
          serviceAccountName: vault-rotation-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

          containers:
            - name: rotate
              image: nexus/vault-rotation:latest
              imagePullPolicy: Always
              command: ["/bin/bash", "/scripts/rotate-secrets.sh"]
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: VAULT_ADDR
                  valueFrom:
                    secretKeyRef:
                      name: vault-config
                      key: VAULT_ADDR
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-rotation-token
                      key: VAULT_TOKEN
                - name: DRY_RUN
                  value: "false"
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp

          volumes:
            - name: scripts
              configMap:
                name: vault-rotation-scripts
                defaultMode: 0550
            - name: tmp
              emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-rotation-sa
  namespace: nexus-settlement
  labels:
    app.kubernetes.io/name: vault-secret-rotation
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-rotation-scripts
  namespace: nexus-settlement
data:
  rotate-secrets.sh: |

    exec /scripts/rotate-secrets.sh
