apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    version: 1
    editable: false
    jsonData:
      httpMethod: GET

      serviceMap:
        datasourceUid: prometheus

      nodeGraph:
        enabled: true

      search:
        hide: false

      tracesToLogsV2:
        datasourceUid: prometheus
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
