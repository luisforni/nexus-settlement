global:
  scrape_interval: 15s

  revisionHistoryLimit: 5        - /data
  external_labels:
    environment: 'development'
    project: 'nexus-settlement'

rule_files:
  - 'alerts/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '$1'

  - job_name: 'settlement-service'
    static_configs:
      - targets: ['settlement-service:8001']
    metrics_path: /metrics

  - job_name: 'fraud-detection'
    static_configs:
      - targets: ['fraud-detection:8002']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8003']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    metrics_path: /metrics
