x-healthcheck-defaults: &hc-defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus_settlement}
      POSTGRES_USER: ${POSTGRES_USER:-nexus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus_user} -d ${POSTGRES_DB:-nexus_settlement}"]
    logging: *default-logging
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-CHANGE_ME}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"

    volumes:
      - redis_data:/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME}", "ping"]
    logging: *default-logging
    networks:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/stat > /dev/null || exit 1"]
    logging: *default-logging
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
    logging: *default-logging
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: nexus-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "19080:8080"
    logging: *default-logging
    networks:
      - backend
      - monitoring

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      settlement-service:
        condition: service_healthy
      fraud-detection:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: api-gateway
    ports:
      - "4000:3000"
    volumes:
      - ./services/api-gateway/src:/app/src:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
    logging: *default-logging
    networks:
      - frontend
      - backend

  settlement-service:
    build:
      context: ./services/settlement-service
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: settlement-service
    ports:
      - "18001:8001"
    volumes:
      - ./services/settlement-service/app:/app/app:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health')"]
    logging: *default-logging
    networks:
      - backend

  fraud-detection:
    build:
      context: ./services/fraud-detection
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: fraud-detection
    ports:
      - "18002:8002"
    volumes:
      - ./services/fraud-detection/app:/app/app:ro
      - fraud_model_artifacts:/app/artifacts
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/fraud/health')"]
    logging: *default-logging
    networks:
      - backend

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: notification-service
    ports:
      - "8003:8003"
    volumes:
      - ./services/notification-service/src:/app/src:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
    logging: *default-logging
    networks:
      - backend

  # ── OpenTelemetry Collector ───────────────────────────────────────────────
  # Receives OTLP traces from all 4 services and forwards them to Tempo.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./infrastructure/monitoring/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC (unused by services but exposed for tooling)
      - "127.0.0.1:4318:4318"   # OTLP HTTP — services send traces here
    depends_on:
      - tempo
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/ || exit 1"]
    logging: *default-logging
    networks:
      - backend
      - monitoring

  # ── Grafana Tempo ────────────────────────────────────────────────────────
  # Distributed trace backend. Grafana reads from it via the Tempo datasource.
  tempo:
    image: grafana/tempo:2.4.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./infrastructure/monitoring/tempo.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"   # Tempo HTTP API (Grafana datasource endpoint)
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
    logging: *default-logging
    networks:
      - monitoring

  # ── LocalStack: simulates the AWS API layer for Terraform IaC ──────────────
  # Terraform targets this container instead of real AWS.
  # The application services (postgres, redis, kafka) still use their own
  # containers above; LocalStack is only needed when running `make tf-*`.
  localstack:
    image: localstack/localstack:3.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: ec2,rds,elasticache,kafka,iam,sts,secretsmanager
      DEBUG: "0"
      PERSISTENCE: "1"
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"running\"'"]
    logging: *default-logging
    networks:
      - backend

  # ── HashiCorp Vault (dev mode) ────────────────────────────────────────────
  # Runs in dev mode for local simulation — not for production use.
  # Root token is printed to container logs on first start.
  # Secrets are seeded by infrastructure/vault/seed-secrets.sh on startup.
  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-nexus-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    command: server -dev
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 | grep -q 'Initialized.*true'"]
    logging: *default-logging
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.50.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    logging: *default-logging
    networks:
      - monitoring
      - backend

  grafana:
    image: grafana/grafana:10.3.3
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_SECURITY_DISABLE_GRAVATAR: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging: *default-logging
    networks:
      - monitoring

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  prometheus_data:
  grafana_data:
  fraud_model_artifacts:
  localstack_data:
  tempo_data:
  vault_data:
