name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 1-5"
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  trivy:
    name: Trivy — container & repo scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  bandit:
    name: Bandit — Python SAST
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [settlement-service, fraud-detection]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run Bandit
        run: |
          bandit -r services/${{ matrix.service }}/app \
            -ll \
            -f json \
            -o bandit-${{ matrix.service }}.json || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-${{ matrix.service }}
          path: bandit-${{ matrix.service }}.json

  npm-audit:
    name: npm audit — TS services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}
      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
        working-directory: services/${{ matrix.service }}

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: nexus-settlement
          path: .
          format: HTML
          args: >
            --suppression .github/dependency-check-suppressions.xml
            --failOnCVSS 7
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
